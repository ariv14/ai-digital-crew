name: Daily AI Project of the Day

# NOTE: scheduled cron removed — the daily run now fires from Cloudflare Worker
# → Pipedream (see pipeline/README.md). Actions is also disabled on this
# account by a $0 budget that cannot be modified without a payment method, so
# schedule triggers wouldn't fire anyway. workflow_dispatch kept as break-glass.
on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scripts
        run: npm install

      - name: Run daily scraper
        working-directory: scripts
        run: node daily-scrape.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PIPEDREAM_WEBHOOK_URL: ${{ secrets.PIPEDREAM_WEBHOOK_URL }}
          NOTIFY_TOKEN: ${{ secrets.NOTIFY_TOKEN }}

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily scrape FAILED — ${date}`,
              body: `The daily pipeline failed. The website may be showing stale data.\n\nCheck logs: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['pipeline-failure'],
            });
