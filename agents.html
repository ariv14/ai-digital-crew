<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Agents — Coming Soon | AI Digital Crew</title>
  <meta name="description" content="AI Agents Marketplace is coming soon to AI Digital Crew.">
  <link rel="icon" type="image/png" href="favicon.png?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0f1c;
      --primary: #3b82f6;
      --primary-end: #8b5cf6;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: rgba(255,255,255,0.1);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;overflow:hidden}
    h1,h2{font-family:'Space Grotesk',sans-serif}

    .orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:0.35;z-index:0;pointer-events:none}
    #orb-1{width:500px;height:500px;background:#3b82f6;top:-15%;left:-10%}
    #orb-2{width:400px;height:400px;background:#8b5cf6;bottom:-10%;right:-10%}

    .container{position:relative;z-index:1;max-width:520px;padding:32px 24px}
    .icon{font-size:64px;margin-bottom:24px;display:inline-block;animation:float 3s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    .badge{display:inline-block;padding:6px 16px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--primary);background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);border-radius:20px;margin-bottom:20px}
    h1{font-size:2.25rem;margin-bottom:12px;background:linear-gradient(135deg,var(--primary),var(--primary-end));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    p{color:var(--text-muted);font-size:16px;line-height:1.7;margin-bottom:32px}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:linear-gradient(135deg,var(--primary),var(--primary-end));color:#fff;font-weight:600;font-size:15px;border-radius:12px;text-decoration:none;transition:transform .2s,box-shadow .2s;min-height:48px}
    .btn:hover{transform:translateY(-2px);box-shadow:0 0 24px rgba(59,130,246,0.4);text-decoration:none}
    .btn svg{flex-shrink:0}

    @media(max-width:768px){
      h1{font-size:1.85rem}
      .icon{font-size:56px}
    }
    @media(max-width:480px){
      h1{font-size:1.5rem}
      p{font-size:15px}
      .container{padding:24px 20px}
      .btn{width:100%;justify-content:center}
    }
    @media(max-width:375px){
      h1{font-size:1.35rem}
      .container{padding:20px 16px}
    }
  </style>
</head>
<body>
  <div class="orb" id="orb-1"></div>
  <div class="orb" id="orb-2"></div>

  <div class="container">
    <div class="icon">🤖</div>
    <div class="badge">Work in Progress</div>
    <h1>AI Agents Marketplace</h1>
    <p>We're building a marketplace to discover, compare, and deploy AI agents. Stay tuned — this feature is coming soon.</p>
    <a href="/" class="btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to Home
    </a>
  </div>
</body>
</html>
