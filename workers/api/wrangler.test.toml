# Test-only wrangler config used by vitest-pool-workers.
# Deliberately omits [ai] (Miniflare can't resolve the wrapper binding) and
# any rate limiter bindings (handlers guard with `if (env.RATE_LIMITER)` for
# test environments). The real production config lives in wrangler.toml.

name = "aidigitalcrew-api-test"
main = "src/worker.ts"
compatibility_date = "2026-04-10"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "QUERY_EMBEDDING_CACHE"
id = "a0a0a0a0a0a0a0a0a0a0a0a0a0a0a0a0"

[vars]
GCP_PROJECT_ID = "ai-digital-crew"
CORS_ORIGIN = "https://aidigitalcrew.com"
GEMINI_API_KEY = "test-gemini-key-not-real"
